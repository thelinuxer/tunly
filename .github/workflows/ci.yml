name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK introspection stack
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi gir1.2-gtk-3.0 gir1.2-ayatanaappindicator3-0.1 \
            gsettings-desktop-schemas dconf-gsettings-backend

      - name: Install pytest
        run: python3 -m pip install --user pytest

      - name: Compile
        run: python3 -m py_compile src/tunly/__init__.py src/tunly/__main__.py

      - name: Unit tests
        run: python3 -m pytest tests/ -v

      - name: Build wheel
        run: |
          python3 -m pip install --user build
          python3 -m build --wheel

      - name: Build deb
        run: make deb
