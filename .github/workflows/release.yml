name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)
          if [ "$tag" != "$ver" ]; then
            echo "Tag v$tag does not match pyproject.toml version $ver" >&2
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sanity-compile
        run: python -m py_compile src/tunly/__init__.py src/tunly/__main__.py

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Build .deb
        run: make deb

      - name: Verify artifacts carry the tagged version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ls "dist/tunly-${tag}-py3-none-any.whl" "dist/tunly-${tag}.tar.gz" "tunly_${tag}_all.deb"
          dpkg-deb -I "tunly_${tag}_all.deb" | grep "Version: ${tag}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "tunly $GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.whl dist/*.tar.gz tunly_*_all.deb

  # PyPI publishing via trusted publishing (OIDC, no token secret).
  pypi:
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
